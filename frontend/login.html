<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — ResumAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-wrap {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            animation: fadeUp .6s ease both;
        }

        .auth-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 2.5rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-center {
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .75rem;
            width: 100%;
            padding: .85rem 1rem;
            background: var(--glass2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            font-size: .95rem;
            font-weight: 500;
            color: var(--fg);
            cursor: pointer;
            transition: var(--t);
            font-family: inherit;
        }

        .social-btn:hover {
            border-color: var(--border2);
            background: var(--glass);
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo logo-center" style="display:flex;text-decoration:none;">
                    <div class="logo-mark">🧠</div>
                    <span class="logo-text">Resum<span>AI</span></span>
                </a>
                <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:.4rem;">Welcome back</h1>
                <p class="text-muted" style="font-size:.9rem;">Sign in to access your resume dashboard</p>
            </div>

            <button class="social-btn" style="margin-bottom:.75rem;">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Continue with Google
            </button>
            <button class="social-btn" style="margin-bottom:1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--fg)">
                    <path
                        d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
                </svg>
                Continue with GitHub
            </button>

            <div class="divider-text">or sign in with email</div>

            <form id="loginForm" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label class="label">Email address</label>
                    <input type="email" class="input" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group" style="position:relative;">
                    <label class="label">Password</label>
                    <input type="password" class="input" id="loginPassword" placeholder="••••••••" required>
                    <button type="button" id="togglePw"
                        style="position:absolute;right:12px;top:35px;background:none;border:none;color:var(--fg2);cursor:pointer;font-size:.85rem;">Show</button>
                </div>
                <div style="text-align:right;margin-bottom:1.25rem;">
                    <a href="#" style="font-size:.85rem;color:var(--p1);text-decoration:none;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;"
                    id="loginBtn">Sign in to ResumAI</button>
            </form>

            <p style="text-align:center;margin-top:1.5rem;font-size:.9rem;color:var(--fg2);">
                Don't have an account? <a href="register.html"
                    style="color:var(--p1);font-weight:600;text-decoration:none;">Create one free</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('togglePw').addEventListener('click', function () {
            const pw = document.getElementById('loginPassword');
            const show = pw.type === 'password';
            pw.type = show ? 'text' : 'password';
            this.textContent = show ? 'Hide' : 'Show';
        });
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.classList.add('btn-loading'); btn.disabled = true;
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
        });
    </script>
</body>

</html>

version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/devcollab
      CLIENT_ORIGIN: http://localhost:5000
      JWT_ACCESS_SECRET: change-me-to-a-random-secret-1
      JWT_REFRESH_SECRET: change-me-to-a-random-secret-2
      GROK_API_KEY: ""
      GITHUB_WEBHOOK_SECRET: ""
      BUG_SIMILARITY_THRESHOLD: "0.8"

volumes:
  mongo-data:
